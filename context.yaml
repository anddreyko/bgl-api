$schema: 'https://raw.githubusercontent.com/context-hub/generator/refs/heads/main/json-schema.json'
documents:
    -   description: 'API'
        outputPath: docs/php-structure.md
        overwrite: true
        sources:
            -   type: tree
                description: 'PHP Directory Structure'
                sourcePaths:
                    - src
                    - config
                    - tests
                    - docs
                    - cli
                    - web
                filePattern: '*'
                renderFormat: ascii
                enabled: true
                showCharCount: true
                maxDepth: 3

    -   description: 'documents'
        outputPath: docs/docs.md
        overwrite: true
        sources:
            -   type: tree
                description: 'documents'
                sourcePaths:
                    - docs
                filePattern: '*'
                renderFormat: ascii
                enabled: true
                showCharCount: true
                maxDepth: 3
