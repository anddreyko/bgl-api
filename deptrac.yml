deptrac:
  paths:
    - ./src
    - ./tests
    - ./vendor

  exclude_files:
    - '#vendor/psr/.*#'
    - '#vendor/.*/stubs/Attribute\.php#'
    - '#vendor/.*/stubs/Stringable\.php#'

  ignore_uncovered_internal_classes: true

  layers:
    - name: Core
      collectors:
        - type: directory
          value: app/src/Core/.*

    - name: Domain
      collectors:
        - type: directory
          value: app/src/Domain/.*

    - name: Application
      collectors:
        - type: directory
          value: app/src/Application/.*

    - name: Infrastructure
      collectors:
        - type: directory
          value: app/src/Infrastructure/.*

    - name: Presentation
      collectors:
        - type: directory
          value: app/src/Presentation/.*

    - name: Vendor
      collectors:
        - type: directory
          value: app/vendor/.*

  ruleset:
    Core: [ ]
    Domain: [ Core ]
    Application: [ Domain, Core ]
    Infrastructure: [ Vendor, Domain, Core ]
    Presentation: [ Vendor, Application, Domain, Core ]
