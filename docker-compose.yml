services:
  api:
    container_name: ${APP_CONTAINER_NAME}
    build:
      context: .docker
      dockerfile: dev/Dockerfile
      target: nginx
    env_file:
      - .env
    volumes:
      - .:/app
    depends_on:
      api-php-fpm:
        condition: service_healthy
    ports:
      - "${APP_EXTERNAL_PORT}:80"
    networks:
      bglapinet:
        ipv4_address: "${APP_NETWORK_IP}"
      default:
        aliases:
          - ${APP_HOST}
    extra_hosts:
      - "${APP_HOST}:${APP_NETWORK_IP}"
    restart: on-failure
    tty: false
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost/ping || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  api-php-fpm:
    build:
      context: .docker
      dockerfile: dev/Dockerfile
      target: php-fpm
    env_file:
      - .env
    volumes:
      - .:/app
    depends_on:
      db-postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      bglapinet:
        ipv4_address: ${FPM_NETWORK_IP}
        aliases:
          - api-php-fpm
    extra_hosts:
      - "${APP_HOST}:${APP_NETWORK_IP}"
    expose:
      - 9000
    healthcheck:
      test: ["CMD-SHELL", "kill -0 1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  api-php-cli:
    build:
      context: .docker
      dockerfile: dev/Dockerfile
      target: php-cli
    env_file:
      - .env
    volumes:
      - .:/app
    networks:
      - bglapinet
    extra_hosts:
      - "${APP_HOST}:${APP_NETWORK_IP}"

  api-ci:
    build:
      context: .
      dockerfile: .docker/prod/Dockerfile
      target: ci
    env_file:
      - .env
    volumes:
      - .:/app
    networks:
      - bglapinet
    extra_hosts:
      - "${APP_HOST}:${APP_NETWORK_IP}"

  db-postgres:
    image: postgres:15.2-alpine
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
    volumes:
      - api-postgres:/var/lib/postgresql/data
    ports:
      - "${DB_EXTERNAL_PORT}:5432"
    networks:
      - bglapinet
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 3

  redis:
    image: redis:7-alpine
    volumes:
      - api-redis:/data
    networks:
      - bglapinet
    restart: on-failure
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  api-postgres:
  api-redis:

networks:
  bglapinet:
    ipam:
      driver: default
      config:
        - subnet: "${BGLNET}"
